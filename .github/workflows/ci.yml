name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno lint supabase/functions/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check supabase/functions/_shared/*.ts

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test supabase/functions/tests/ --allow-env --allow-net --allow-read

  schema-validate:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SQL syntax
        run: |
          # Basic SQL syntax check — ensures migrations parse
          for f in supabase/migrations/*.sql; do
            echo "Checking $f..."
            # Check for common SQL errors
            if grep -Pn '^\s*(CREATE|ALTER|DROP|INSERT)\s' "$f" | grep -v ';$' | head -5; then
              echo "Warning: Possible missing semicolons in $f"
            fi
          done
          echo "Schema files validated"
