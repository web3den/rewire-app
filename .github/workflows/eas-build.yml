name: EAS Build on Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        id: ts_check
        run: npx tsc --noEmit 2>&1 | tee reports/ci-logs/ts-check.log
        continue-on-error: true

      - name: Run tests
        id: tests
        run: npx jest --ci --forceExit --json --outputFile=reports/ci-logs/test-results.json 2>&1 | tee reports/ci-logs/test-output.log
        continue-on-error: true

      - name: Run ForgeBeyond analysis on failure
        if: steps.ts_check.outcome == 'failure' || steps.tests.outcome == 'failure'
        run: |
          # Combine all CI logs
          mkdir -p reports/ci-logs
          cat reports/ci-logs/*.log > reports/ci-logs/combined.log 2>/dev/null || true
          
          # Run ForgeBeyond analysis
          TIMESTAMP=$(date -u +%Y-%m-%d_%H-%M-%S)
          node tools/forgebeyond/lib/analyzer.js \
            reports/ci-logs/combined.log \
            --config tools/forgebeyond/forgebeyond.config.yaml \
            --repo-root . \
            --output "reports/ci-analysis-${TIMESTAMP}.json"
          
          echo "::group::ForgeBeyond Analysis Results"
          cat "reports/ci-analysis-${TIMESTAMP}.json" | node -e "
            const report = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('=== ForgeBeyond CI Analysis ===');
            console.log('Status:', report.summary.status);
            console.log('Findings:', report.summary.total_findings);
            console.log('Confidence:', (report.summary.confidence * 100).toFixed(0) + '%');
            if (report.findings.length > 0) {
              console.log('\nTop findings:');
              for (const f of report.findings.slice(0, 10)) {
                console.log('  [' + f.severity.toUpperCase() + '] ' + f.rule_name + ' (' + f.rule_id + ')');
                console.log('    → ' + f.suggestion);
              }
            }
            if (report.summary.llm_analysis_recommended) {
              console.log('\n⚠️  LLM analysis recommended for better diagnosis');
            }
          "
          echo "::endgroup::"

      - name: Upload ForgeBeyond report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgebeyond-reports
          path: reports/ci-analysis-*.json
          if-no-files-found: ignore

      - name: Fail if checks failed
        if: steps.ts_check.outcome == 'failure' || steps.tests.outcome == 'failure'
        run: |
          echo "❌ CI checks failed. See ForgeBeyond analysis above for details."
          exit 1

  build:
    name: Build iOS Preview
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Build with EAS
        run: eas build --platform ios --profile simulator --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build complete
        if: always()
        run: echo "Build triggered! Check https://expo.dev/accounts/hopeatforge/projects/rewire/builds"
